_target_: conglude.datamodule.ConGLUDeDataset

# Reuse the smoke-preprocessed PDBbind dataset as a tiny test set. With
# split=test, ConGLUDeDataset reads info/protein_ids.txt directly (all 38
# processed entries), so this exercises every test-mode metric path.
dataset_dir: ./data/datasets/train_datasets/pdbbind
dataset_name: smoke_test
task: vs
structure_based: true
split: test
batch_size: 8

extract_ligands: from_file
labeled_smiles: none
calc_mol_feats: true
multi_ligand: false
